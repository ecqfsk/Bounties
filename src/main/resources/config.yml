# Bounties - Configuracao
# Compativel com Minecraft 1.8 ate 1.21
# Dev: ecq | Desenvolvido com muito amor <3

settings:
  # Valor minimo para colocar uma recompensa
  min-amount: 100.0
  # Valor maximo para colocar uma recompensa (0 = sem limite)
  max-amount: 0
  # Taxa cobrada ao colocar recompensa (porcentagem, ex: 5 = 5%)
  placement-fee-percent: 0
  # Salvar dados automaticamente a cada X segundos
  auto-save-interval: 300
  # Impedir recompensa em si mesmo
  block-self-bounty: true
  # Anunciar globalmente quando uma recompensa e colocada
  announce-bounty: true
  # Anunciar globalmente quando uma recompensa e coletada
  announce-claim: true

  # --- Expiracao ---
  # Tempo em segundos para a recompensa expirar (0 = nunca)
  expire-after-seconds: 86400
  # Reembolsar contribuidores quando expirar
  expire-refund: true
  # Avisar contribuidores X segundos antes de expirar (0 = desligado)
  expire-warn-seconds: 300
  # Renovar expiracao ao adicionar valor
  refresh-expire-on-add: true
  # Anunciar quando uma recompensa expira
  announce-expire: true

  # --- Cooldown / limites ---
  # Cooldown em segundos entre colocar/adicionar recompensas (0 = off)
  cooldown-seconds: 30
  # Maximo de alvos em que o jogador pode ter contribuicao ativa (0 = ilimitado)
  max-active-placed: 5
  # Maximo de dinheiro que o jogador pode ter em contribuicoes ativas (0 = ilimitado)
  max-amount-placed: 0
  # Segundos de combate recentes exigidos para claim (0 = desligado)
  min-combat-seconds: 0

  # --- Reembolso ---
  # Reembolsar ao remover recompensa
  refund-on-remove: true
  # Reembolsar contribuidores anteriores ao usar /bounty set (substituir)
  refund-on-replace: true
  # Porcentagem reembolsada (100 = total)
  refund-percent: 100.0
  # Permitir que contribuidores removam a propria contribuicao
  allow-own-remove: true

killer-top:
  # Kills minimas para alguem poder ser top 1 assassino
  min-kills: 1
  # Anunciar quando alguem vira top 1
  broadcast-new-top: true
  # Tag exibida no chat e tab (via nChat) para o top 1
  tag:
    text: "&4&lKILLER"

visuals:
  enabled: true
  particles: true
  action-bar: true
  # Glow no alvo (1.9+; pode conflitar com outros plugins)
  glow: false
  sounds: true
  particle-type: FLAME
  particle-count: 8
  interval-ticks: 20
  action-bar-format: "&c☠ Recompensa: &f{amount}"
  sound-place: ENTITY_EXPERIENCE_ORB_PICKUP
  sound-claim: ENTITY_PLAYER_LEVELUP
  never-expire-text: "&7Nunca"

history:
  # Maximo de entradas salvas (0 = ilimitado)
  max-entries: 500
  # Quantidade padrao no /bounty history
  display-limit: 10

